<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de perros</title>
</head>

<body>
    <h1>Informacion de las mascotas</h1>
    <p>Creador del proyecto: <strong th:text="${creador}"></strong></p>
    <p>Lista de elementos mediante una tabla recorriendo una lista de objetos usando th:each</p>
    <table border="1">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Raza</th>
                <th>Color</th>
                <th>Edad</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="perro : ${listaPerros}">
                <td th:text="${perro.nombre}"></td>
                <td th:text="${perro.raza}"></td>
                <td th:text="${perro.color}"></td>
                <td th:text="${perro.edad}"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
